services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tevrix
      POSTGRES_PASSWORD: tevrix
      POSTGRES_DB: tevrix_crm
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tevrix -d tevrix_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
